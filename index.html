<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Health Monitoring System - Login</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://kit.fontawesome.com/b437805b38.js" crossorigin="anonymous"></script>
</head>

<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon">
          <i class="fa-solid fa-stethoscope"></i>
        </div>
        <h1 class="login-title">SmartHealth Monitor</h1>
        <p class="login-subtitle">IoT Based Health Monitoring System</p>
      </div>

      <form onsubmit="handle_login(event)" id="loginForm" class="login-form">
        <!-- Email or Username -->
        <div class="form-group">
          <label for="login_field">
            <i class="fa-solid fa-user"></i> Email or Username
          </label>
          <input type="text" id="login_field" name="email" required placeholder="abc@gmail.com or username">
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <label for="login_password">
            <i class="fa-solid fa-lock"></i> Password
          </label>
          <input type="password" id="login_password" name="password" required placeholder="••••••••">
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn-primary btn-login">
          <i class="fa-solid fa-arrow-right-to-bracket"></i> Login
        </button>
      </form>

      <div class="login-divider">
        <span>Don't have an account?</span>
      </div>

      <a href="register.html" class="btn-secondary btn-full-width">
        <i class="fa-solid fa-user-plus"></i> Register Here
      </a>

      <div class="login-footer">
        <p><strong>Demo Credentials:</strong></p>
        <small><strong>Doctor:</strong> Shahid or abc@hospital.com | Pass: demo123</small><br>
      </div>
    </div>

    <!-- Floating Shapes (Design Elements) -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <script src="js/script.js"></script>
</body>

</html>
