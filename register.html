<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Health Monitoring System - Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/b437805b38.js" crossorigin="anonymous"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-teal-500 to-cyan-600 flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl px-8 py-8">

    <!-- Header -->
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-teal-100 mb-3">
        <i class="fa-solid fa-stethoscope text-teal-600 text-xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Create Account</h1>
      <p class="text-gray-400 text-sm mt-1">Join SmartHealth Monitor</p>
    </div>

    <form onsubmit="handle_registration(event)">

      <!-- User Type -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-600 mb-2">
          <i class="fa-solid fa-user-tie mr-1"></i> User Type
        </label>
        <div class="flex gap-3">
          <label class="flex-1 flex items-center gap-2 border-2 border-gray-200 rounded-lg px-3 py-2 cursor-pointer has-[:checked]:border-teal-500 has-[:checked]:bg-teal-50 transition-colors">
            <input type="radio" name="user_type" value="doctor" checked onchange="toggleFields(this.value)" class="accent-teal-500">
            <span class="text-sm text-gray-600"><i class="fa-solid fa-user-doctor text-teal-500 mr-1"></i> Doctor</span>
          </label>
          <label class="flex-1 flex items-center gap-2 border-2 border-gray-200 rounded-lg px-3 py-2 cursor-pointer has-[:checked]:border-teal-500 has-[:checked]:bg-teal-50 transition-colors">
            <input type="radio" name="user_type" value="caretaker" onchange="toggleFields(this.value)" class="accent-teal-500">
            <span class="text-sm text-gray-600"><i class="fa-solid fa-person text-teal-500 mr-1"></i> Caretaker</span>
          </label>
        </div>
      </div>

      <!-- Name -->
      <div class="mb-4">
        <label for="fullName" class="block text-sm font-medium text-gray-600 mb-1">
          <i class="fa-solid fa-circle-user mr-1"></i> Name
        </label>
        <input type="text" id="reg_username" name="fullName" placeholder="Vivek Khanna" required
          class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-700 placeholder-gray-300 focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-100 transition">
      </div>

      <!-- Email -->
      <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-gray-600 mb-1">
          <i class="fa-solid fa-envelope mr-1"></i> Email
        </label>
        <input type="email" id="reg_email" name="email" placeholder="your@email.com" required
          class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-700 placeholder-gray-300 focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-100 transition">
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label for="password" class="block text-sm font-medium text-gray-600 mb-1">
          <i class="fa-solid fa-lock mr-1"></i> Password
        </label>
        <input type="password" id="reg_password" name="password" placeholder="••••••••" required
          class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-700 placeholder-gray-300 focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-100 transition">
      </div>

      <!-- Doctor ID (patient only) -->
      <div id="doctor_id_group" class="mb-4 hidden">
        <label for="doctor_id" class="block text-sm font-medium text-gray-600 mb-1">
          <i class="fa-solid fa-id-card mr-1"></i> Doctor Email
        </label>
        <input type="text" id="reg_doctor_id" name="doctor_id" placeholder="e.g. DR-00421"
          class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-700 placeholder-gray-300 focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-100 transition">
        <p class="text-xs text-gray-400 mt-1">Ask your doctor for their ID to link your account.</p>
      </div>

      <!-- Submit -->
      <button type="submit"
        class="w-full mt-2 py-2.5 bg-teal-500 hover:bg-teal-600 text-white font-semibold rounded-lg text-sm transition">
        <i class="fa-solid fa-user-plus mr-1"></i> Register
      </button>

    </form>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-5">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="text-xs text-gray-400">Already have an account?</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>

    <!-- Login -->
    <a href="index.html"
      class="flex items-center justify-center gap-2 w-full py-2.5 border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition">
      <i class="fa-solid fa-arrow-right-to-bracket"></i> Login Here
    </a>

    <p class="text-center text-xs text-gray-300 mt-5">By registering, you agree to our terms and conditions.</p>
  </div>

  <script>
    function toggleFields(userType) {
      const group = document.getElementById('doctor_id_group');
      const input = document.getElementById('reg_doctor_id');
      if (userType === 'caretaker') {
        group.classList.remove('hidden');
        input.setAttribute('required', 'required');
      } else {
        group.classList.add('hidden');
        input.removeAttribute('required');
        input.value = '';
      }
    }
  </script>

  <script src="script.js"></script>
</body>
</html>
